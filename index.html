  <style>
    /* Скрива всичко свързано с Google Translate UI */
    .goog-te-banner-frame,
    .goog-te-gadget,
    .goog-te-gadget-icon,
    .goog-logo-link,
    #goog-gt-tt,
    #goog-gt-,
    .goog-tooltip,
    .goog-tooltip:hover,
    .goog-te-balloon-frame,
    .goog-te-ftab-float,
    .goog-te-menu-frame,
    iframe.goog-te-menu-frame,
    .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
    .VIpgJd-ZVi9od-aZ2wEe,
    .VIpgJd-yAWNEb-L7lbkb,
    .skiptranslate { display: none !important; visibility: hidden !important; }
    body { top: 0 !important; position: static !important; }
    .goog-text-highlight,
    .goog-text-highlight * { background: none !important; background-color: transparent !important; box-shadow: none !important; border: none !important; outline: none !important; }
    font { background-color: transparent !important; box-shadow: none !important; }
    font[style] { background-color: transparent !important; }
  </style>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'bg', autoDisplay: false }, 'google_translate_element');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script>
    function removeTextHighlight() {
      document.querySelectorAll('.goog-text-highlight').forEach(function(el) {
        el.classList.remove('goog-text-highlight');
        el.style.background = 'none';
        el.style.boxShadow = 'none';
      });
      document.querySelectorAll('font').forEach(function(el) {
        el.style.backgroundColor = 'transparent';
        el.style.boxShadow = 'none';
      });
    }
    function removeGoogleBar() {
      var selectors = [
        '.goog-te-banner-frame', '#goog-gt-tt', '.goog-te-balloon-frame',
        '.VIpgJd-ZVi9od-aZ2wEe-wOHMyf', '.VIpgJd-yAWNEb-L7lbkb'
      ];
      selectors.forEach(function(s) {
        var el = document.querySelector(s);
        if (el) el.remove();
      });
      document.body.style.top = '0';
    }
    window.addEventListener('load', function() {
      removeGoogleBar();
      removeTextHighlight();
      setInterval(function() { removeGoogleBar(); removeTextHighlight(); }, 300);
    });
  </script>
